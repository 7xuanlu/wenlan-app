name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Test & Lint
    runs-on: macos-latest
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(main): release')

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      # Tauri's tauri.conf.json declares externalBin sidecars (wenlan,
      # wenlan-server, wenlan-mcp, cloudflared) that the build script resolves at compile
      # time. CI doesn't ship the daemon, so create empty placeholders.
      # Production DMG builds happen elsewhere with real binaries.
      - name: Create sidecar placeholders for Tauri build script
        run: |
          mkdir -p app/binaries
          touch app/binaries/wenlan-aarch64-apple-darwin
          touch app/binaries/wenlan-server-aarch64-apple-darwin
          touch app/binaries/wenlan-mcp-aarch64-apple-darwin
          touch app/binaries/cloudflared-aarch64-apple-darwin

      - name: Check Rust formatting
        run: cargo fmt --check --all

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test -p wenlan-app --lib

      - name: TypeScript check
        run: pnpm exec tsc -b

      - name: Run frontend tests
        run: pnpm test

  download-smoke:
    name: Download Smoke
    # macos-14 is Apple Silicon (arm64) -- required because the pinned
    # daemon release asset (Task 2's --download mode) ships darwin-arm64
    # binaries only, and this job execs them directly (`--help`) rather than
    # just checking bytes on disk.
    runs-on: macos-14
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(main): release')

    steps:
      - uses: actions/checkout@v4

      - name: Download pinned daemon sidecars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/prepare-sidecars.sh --download

      - name: Smoke test downloaded binaries
        run: |
          ./app/binaries/wenlan-server-aarch64-apple-darwin --help
          ./app/binaries/wenlan-aarch64-apple-darwin --help
