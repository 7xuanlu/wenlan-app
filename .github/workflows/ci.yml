name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      windows_native_smoke:
        description: Run only the Windows Server 2022 native compatibility smoke
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Test & Lint
    runs-on: macos-latest
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(main): release') &&
      !(github.event_name == 'workflow_dispatch' && inputs.windows_native_smoke)

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      # Tauri's tauri.conf.json declares externalBin sidecars (wenlan,
      # wenlan-server, wenlan-mcp, cloudflared) that the build script resolves at compile
      # time. CI doesn't ship the daemon, so create empty placeholders.
      # Production DMG builds happen elsewhere with real binaries.
      - name: Create sidecar placeholders for Tauri build script
        run: |
          mkdir -p app/binaries
          touch app/binaries/wenlan-aarch64-apple-darwin
          touch app/binaries/wenlan-server-aarch64-apple-darwin
          touch app/binaries/wenlan-mcp-aarch64-apple-darwin
          touch app/binaries/cloudflared-aarch64-apple-darwin

      - name: Check Rust formatting
        run: cargo fmt --check --all

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test -p wenlan-app --lib

      - name: TypeScript check
        run: pnpm exec tsc -b

      - name: Run i18n gates
        run: pnpm test:i18n

      - name: Run frontend tests
        run: pnpm test

      - name: Build and verify fixture-only Review app
        run: pnpm review:build && pnpm review:verify

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run frontend e2e tests
        run: pnpm test:e2e

      - name: Run fixture-only Review e2e tests
        run: pnpm test:e2e:review

  download-smoke:
    name: Download Smoke
    # macos-14 is Apple Silicon (arm64) -- required because the pinned
    # daemon release asset (Task 2's --download mode) ships darwin-arm64
    # binaries only, and this job execs them directly (`--help`) rather than
    # just checking bytes on disk.
    runs-on: macos-14
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(main): release') &&
      !(github.event_name == 'workflow_dispatch' && inputs.windows_native_smoke)

    steps:
      - uses: actions/checkout@v6

      - name: Download pinned daemon sidecars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_TRIPLE: aarch64-apple-darwin
          WENLAN_SIDECAR_MANIFEST: ${{ runner.temp }}/staged-sidecars.json
        run: bash scripts/prepare-sidecars.sh --download

      - name: Smoke test downloaded binaries
        run: |
          ./app/binaries/wenlan-server-aarch64-apple-darwin --help
          ./app/binaries/wenlan-aarch64-apple-darwin --help
          ./app/binaries/cloudflared-aarch64-apple-darwin --version
          node -e "const fs=require('fs'); const p=process.env.RUNNER_TEMP+'/staged-sidecars.json'; const m=JSON.parse(fs.readFileSync(p)); if(m.staged.length!==4) throw new Error('expected four staged Darwin sidecars')"

  windows-native-smoke:
    name: Windows Native Smoke (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.windows_native_smoke
    permissions:
      contents: read
    uses: ./.github/workflows/windows-smoke.yml
