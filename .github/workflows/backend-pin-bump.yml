name: Backend pin bump

# Polls the sibling daemon repo (7xuanlu/wenlan) for a newer release. When a
# newer release's Darwin and Windows assets download and checksum, and the
# Darwin payload extracts and runs clean, this opens a PR bumping the one
# backend tag plus both platform hashes AND the app's own release version to
# match. A human reviews and merges that PR.
#
# The app version files are NOT optional extras here: scripts/release-version-
# sync.test.ts asserts package.json / app/tauri.conf.json / app/Cargo.toml all
# equal the pinned daemon version. A pin-only bump therefore lands a red main
# every time -- and because of the GITHUB_TOKEN rule below, this PR's own CI
# never runs to catch it. That is exactly how v0.13.0 broke main (PR #85).
#
# Why the download+sha+extract+--help smoke lives HERE instead of relying on
# ci.yml: GitHub does NOT fire `pull_request` workflows for PRs opened by
# GITHUB_TOKEN, so ci.yml's download-smoke will NOT run on the bump PR this
# workflow opens. That's exactly why step "Smoke test extracted daemon
# binaries" below runs inside this poll -- the poll IS the gate for the pin
# change, not the PR's own CI. If branch protection requires status checks
# on that PR, the maintainer merges via admin override or re-runs checks
# manually.

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check daemon release and bump pin
    # macos-14 (Apple Silicon / arm64) is REQUIRED here, not a style choice:
    # the "Smoke test extracted daemon binaries" step below actually
    # executes the downloaded darwin-arm64 wenlan-server/wenlan binaries via
    # `--help`. An x86_64/Linux runner can't exec that Mach-O arm64 binary at
    # all (false-fail on exec format), so only an arm64 macOS runner can
    # prove the asset is real and runnable.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Read pinned tag
        id: pinned
        run: |
          PINNED="$(node scripts/sidecar-lock.mjs get backend_tag)"
          if [ -z "$PINNED" ]; then
            echo "error: .wenlan-backend-version has no backend_tag" >&2
            exit 1
          fi
          echo "tag=$PINNED" >> "$GITHUB_OUTPUT"
          echo "Pinned tag: $PINNED"

      - name: Get latest daemon release tag
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cross-repo read of the PUBLIC 7xuanlu/wenlan repo, authenticated
          # by this workflow's own GITHUB_TOKEN. This works only because
          # that repo is public; if it ever goes private this 404s and
          # fails loud here (no silent continue-on-error), same contract as
          # scripts/prepare-sidecars.sh's --download mode.
          LATEST="$(gh release view --repo 7xuanlu/wenlan --json tagName -q .tagName)"
          if [ -z "$LATEST" ]; then
            echo "error: could not resolve latest release tag for 7xuanlu/wenlan" >&2
            exit 1
          fi
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest daemon release: $LATEST"

      - name: Compare versions
        id: compare
        run: |
          PINNED="${{ steps.pinned.outputs.tag }}"
          LATEST="${{ steps.latest.outputs.tag }}"
          if [ "$LATEST" = "$PINNED" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "up to date: pinned $PINNED already matches latest $LATEST"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "new release available: $PINNED -> $LATEST"
          fi

      # Steps below only run when a newer tag was found above. A complete
      # download + sha256 + extract + run is the real proof the asset
      # finished uploading -- this replaces a weak size-only check and
      # closes the race where a release tag is published before its asset
      # upload completes.
      - name: Download candidate assets
        if: steps.compare.outputs.up_to_date != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          mkdir -p "$RUNNER_TEMP/pin"
          if ! gh release download "$LATEST" --repo 7xuanlu/wenlan \
              --pattern 'wenlan-darwin-arm64.tar.gz' \
              --dir "$RUNNER_TEMP/pin" --clobber; then
            echo "error: failed to download wenlan-darwin-arm64.tar.gz from 7xuanlu/wenlan release $LATEST (tag-without-asset race?)" >&2
            exit 1
          fi
          if ! gh release download "$LATEST" --repo 7xuanlu/wenlan \
              --pattern 'wenlan-windows-x64.zip' \
              --dir "$RUNNER_TEMP/pin" --clobber; then
            echo "error: failed to download wenlan-windows-x64.zip from 7xuanlu/wenlan release $LATEST (tag-without-asset race?)" >&2
            exit 1
          fi

      - name: Compute checksums
        if: steps.compare.outputs.up_to_date != 'true'
        id: sha
        run: |
          DARWIN_SHA="$(shasum -a 256 "$RUNNER_TEMP/pin/wenlan-darwin-arm64.tar.gz" | awk '{print $1}')"
          WINDOWS_SHA="$(shasum -a 256 "$RUNNER_TEMP/pin/wenlan-windows-x64.zip" | awk '{print $1}')"
          echo "darwin_sha256=$DARWIN_SHA" >> "$GITHUB_OUTPUT"
          echo "windows_sha256=$WINDOWS_SHA" >> "$GITHUB_OUTPUT"
          echo "darwin sha256: $DARWIN_SHA"
          echo "windows sha256: $WINDOWS_SHA"

      - name: Validate candidate payloads
        if: steps.compare.outputs.up_to_date != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/pin/x"
          tar xzf "$RUNNER_TEMP/pin/wenlan-darwin-arm64.tar.gz" -C "$RUNNER_TEMP/pin/x"
          for payload in wenlan.exe wenlan-server.exe wenlan-mcp.exe onnxruntime.dll; do
            if ! unzip -Z1 "$RUNNER_TEMP/pin/wenlan-windows-x64.zip" | grep -qx "$payload"; then
              echo "error: Windows candidate is missing $payload" >&2
              exit 1
            fi
          done

      # Extraction succeeding already proves the tarball is a complete,
      # non-truncated download. Running --help on both binaries is the
      # final proof this is a real, executable arm64 daemon build.
      - name: Smoke test extracted daemon binaries
        if: steps.compare.outputs.up_to_date != 'true'
        run: |
          cd "$RUNNER_TEMP/pin/x"
          chmod +x wenlan-server wenlan
          xattr -cr wenlan-server wenlan
          ./wenlan-server --help
          ./wenlan --help
          echo "smoke test passed: both binaries ran --help and exited 0"

      - name: Check for existing bump PR
        if: steps.compare.outputs.up_to_date != 'true'
        id: idempotency
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          BRANCH="backend-pin/$LATEST"
          EXISTING="$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number')"
          if [ -n "$EXISTING" ]; then
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
            echo "PR #$EXISTING already open from $BRANCH, skipping"
          else
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pin bump PR
        if: steps.compare.outputs.up_to_date != 'true' && steps.idempotency.outputs.pr_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          DARWIN_SHA="${{ steps.sha.outputs.darwin_sha256 }}"
          WINDOWS_SHA="${{ steps.sha.outputs.windows_sha256 }}"
          VERSION="${LATEST#v}"
          BRANCH="backend-pin/$LATEST"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          CLOUDFLARED_VERSION_BEFORE="$(node scripts/sidecar-lock.mjs get cloudflared_version)"
          CLOUDFLARED_DARWIN_SHA_BEFORE="$(node scripts/sidecar-lock.mjs get cloudflared_darwin_arm64_sha256)"
          CLOUDFLARED_WINDOWS_SHA_BEFORE="$(node scripts/sidecar-lock.mjs get cloudflared_windows_x64_sha256)"
          node scripts/sidecar-lock.mjs update-backend "$LATEST" "$DARWIN_SHA" "$WINDOWS_SHA"
          if [ "$(node scripts/sidecar-lock.mjs get cloudflared_version)" != "$CLOUDFLARED_VERSION_BEFORE" ] || \
             [ "$(node scripts/sidecar-lock.mjs get cloudflared_darwin_arm64_sha256)" != "$CLOUDFLARED_DARWIN_SHA_BEFORE" ] || \
             [ "$(node scripts/sidecar-lock.mjs get cloudflared_windows_x64_sha256)" != "$CLOUDFLARED_WINDOWS_SHA_BEFORE" ]; then
            echo "error: backend pin update changed the cloudflared lock" >&2
            exit 1
          fi

          # BSD sed (macos-14 runner) needs the empty -i argument.
          sed -i '' -E 's/^(  "version": )"[^"]*"/\1"'"$VERSION"'"/' package.json app/tauri.conf.json
          sed -i '' -E 's/^version = "[^"]*"/version = "'"$VERSION"'"/' app/Cargo.toml
          awk -v v="$VERSION" '
            /^name = "wenlan-app"$/ { print; getline; sub(/"[^"]*"/, "\"" v "\""); print; next }
            { print }
          ' Cargo.lock > Cargo.lock.bump && mv Cargo.lock.bump Cargo.lock

          # A sed that matches nothing exits 0 and leaves the file untouched, so
          # without this the workflow would happily commit a pin-only bump --
          # the exact partial change that reds main, on a PR whose CI never runs.
          # Re-read the four values from disk and refuse to open a PR unless they
          # all actually moved.
          PKG="$(awk -F'"' '/^  "version":/{print $4; exit}' package.json)"
          TAURI="$(awk -F'"' '/^  "version":/{print $4; exit}' app/tauri.conf.json)"
          CARGO="$(awk -F'"' '/^version = /{print $2; exit}' app/Cargo.toml)"
          LOCK="$(awk -F'"' '/^name = "wenlan-app"$/{getline; print $2; exit}' Cargo.lock)"
          if [ "$PKG" != "$VERSION" ] || [ "$TAURI" != "$VERSION" ] || \
             [ "$CARGO" != "$VERSION" ] || [ "$LOCK" != "$VERSION" ]; then
            echo "error: version bump did not apply cleanly (want $VERSION; got package.json=$PKG tauri.conf.json=$TAURI Cargo.toml=$CARGO Cargo.lock=$LOCK)" >&2
            exit 1
          fi
          echo "version lockstep verified: all four files at $VERSION"

          git add .wenlan-backend-version package.json app/tauri.conf.json app/Cargo.toml Cargo.lock
          git commit -m "chore: adopt Wenlan $LATEST"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: adopt Wenlan $LATEST" \
            --body "Bumps \`.wenlan-backend-version\` to \`$LATEST\` (Darwin sha256 \`$DARWIN_SHA\`, Windows sha256 \`$WINDOWS_SHA\`), and the app's own release version to \`$VERSION\` to match.

          This workflow already downloaded both pinned backend assets from the \`$LATEST\` release, verified their independent sha256 values and required payloads, then ran the Darwin \`wenlan-server --help\` and \`wenlan --help\` successfully on an arm64 runner before opening this PR (see the run that opened this PR). It preserved all cloudflared lock fields and re-read all four app version files from disk.

          The app version files ship together with the pin because \`scripts/release-version-sync.test.ts\` requires it. Note: GitHub does not run \`pull_request\` workflows for PRs opened by \`GITHUB_TOKEN\`, so ci.yml will not run here -- the in-workflow smoke and the lockstep assertion above are the gate for this change." \
            --head "$BRANCH" \
            --base main
